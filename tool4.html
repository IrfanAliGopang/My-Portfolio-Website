<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker | My Portfolio</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #0b0000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
    }

    .container {
        background: rgba(20,0,0,0.95);
        padding: 40px 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px rgba(255,0,0,0.5);
        width: 100%;
        max-width: 400px;
    }

    h2 {
        color: #ff1a1a;
        margin-bottom: 20px;
    }

    input[type="color"] {
        width: 100%;
        height: 60px;
        border: none;
        margin-bottom: 20px;
        cursor: pointer;
        border-radius: 10px;
    }

    .output {
        background: #1a0000;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #ff1a1a;
        margin-top: 10px;
        display: none;
    }

    .color-box {
        width: 100%;
        height: 60px;
        border-radius: 10px;
        margin-top: 10px;
        border: 1px solid #ff1a1a;
    }

    button {
        padding: 12px 25px;
        background: #ff1a1a;
        border: none;
        border-radius: 25px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
        width: 100%;
    }

    button:hover {
        background: #b30000;
    }

    #copyBtn.copied {
        background: #28a745; /* green */
    }

</style>
</head>
<body>
<div class="container">
    <h2>Color Picker & HEX-RGB Converter</h2>
    <input type="color" id="colorInput" value="#ff1a1a" onchange="updateColor()">

    <div class="output" id="output">
        <p>HEX: <span id="hexValue"></span></p>
        <p>RGB: <span id="rgbValue"></span></p>
        <div class="color-box" id="colorBox"></div>
    </div>

    <button id="copyBtn" onclick="copyColor()">Copy Color</button>
</div>

<script>
    let currentColor = "#ff1a1a";
    const output = document.getElementById("output");
    const hexValue = document.getElementById("hexValue");
    const rgbValue = document.getElementById("rgbValue");
    const colorBox = document.getElementById("colorBox");
    const copyBtn = document.getElementById("copyBtn");

    function updateColor() {
        const color = document.getElementById("colorInput").value;
        currentColor = color;

        // Convert HEX to RGB
        const r = parseInt(color.slice(1,3),16);
        const g = parseInt(color.slice(3,5),16);
        const b = parseInt(color.slice(5,7),16);

        hexValue.textContent = color;
        rgbValue.textContent = `rgb(${r}, ${g}, ${b})`;
        colorBox.style.backgroundColor = color;

        output.style.display = "block";
        copyBtn.style.display = "block";
        copyBtn.textContent = "Copy Color";
        copyBtn.classList.remove("copied");
    }

    function copyColor() {
        navigator.clipboard.writeText(currentColor)
            .then(() => {
                copyBtn.textContent = "✔ Copied!";
                copyBtn.classList.add("copied");
                setTimeout(() => {
                    copyBtn.textContent = "Copy Color";
                    copyBtn.classList.remove("copied");
                }, 2000);
            });
    }

    // Initialize
    updateColor();
</script>
</body>
</html>
